name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install ruff
      - run: ruff check .

  type-check:
    name: mypy
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt mypy
      - name: Type check
        run: mypy app/ --ignore-missing-imports --no-error-summary 2>&1 | tail -20

  test:
    name: pytest
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: sqlite:///./test_energy_oracle.db
      MODEL_PATH: /tmp/test_model.joblib
      METRICS_PATH: /tmp/test_metrics.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml 2>&1 | tail -60
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
